# =============================================================
# AssetMgmt - API + local SQL Server for development.
#
#   docker compose up --build
#
# Override secrets via a .env file or the shell environment:
#   SA_PASSWORD - SQL Server sa password
#   JWT_SECRET  - JWT signing secret, >= 32 chars
# =============================================================

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      SA_PASSWORD: "${SA_PASSWORD:-Str0ng!Passw0rd}"
    ports:
      - "${DB_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - db
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-Str0ng!Passw0rd}"
    volumes:
      - ./Migrations/manual:/sql:ro
      - ./docker/db-init.sh:/db-init.sh:ro
    entrypoint: ["/bin/bash", "/db-init.sh"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DB_SERVER: db
      DB_PORT: "1433"
      DB_NAME: "${DB_NAME:-AssetMgmt}"
      DB_USER: sa
      DB_PASSWORD: "${SA_PASSWORD:-Str0ng!Passw0rd}"
      DB_TRUST_CERT: "${DB_TRUST_CERT:-True}"
      JWT_SECRET: "${JWT_SECRET}"
      SEED_DEFAULT_PASSWORD: "${SEED_DEFAULT_PASSWORD:-Password123!}"
    ports:
      - "8080:8080"

volumes:
  sqlserver-data:
